<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Sensitivity Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Valorant Sensitivity Calculator</h1>
  </header>
  <main>
    <section id="calculator">
      <label for="dpi">DPI:</label>
      <input type="number" id="dpi" required>
      <label for="sensitivity">Sensitivity:</label>
      <input type="number" id="sensitivity" step="0.001" required>
      <button id="calculateBtn">Calculate</button>
    </section>
    <section id="results" class="hidden">
      <h2>Results</h2>
      <p>eDPI: <span id="edpi"></span></p>
      <p>cm/360: <span id="cm360"></span></p>
      <p>PSA Low: <span id="psaLow"></span></p>
      <p>PSA Average: <span id="psaAverage"></span></p>
      <p>PSA High: <span id="psaHigh"></span></p>
    </section>
    <div id="ad-slot">
      <!-- Advertisement placeholder -->
    </div>
  </main>
  <footer>
    <p>Made for Valorant players. Powered by the Valorant Sens Calculator API.</p>
    <p><a href="https://buymeacoffee.com/username">Support us</a></p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
